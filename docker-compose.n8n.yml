version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: lsemb-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=lsemb2025
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Istanbul
      - N8N_METRICS=true
      - N8N_LOG_LEVEL=info
      # Enable community nodes
      - N8N_CUSTOM_EXTENSIONS=~/.n8n/custom
      # PostgreSQL connection for workflow storage
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=host.docker.internal
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=lsemb
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=Semsiye!22
      - DB_POSTGRESDB_SCHEMA=n8n
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-community-node:/home/node/.n8n/custom/n8n-nodes-lsemb:ro
    networks:
      - lsemb-network

networks:
  lsemb-network:
    external: false

volumes:
  n8n_data:
    driver: local
