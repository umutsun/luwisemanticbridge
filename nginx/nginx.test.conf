worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # HTTPS Server - Test Configuration
    server {
        listen 443 ssl;
        server_name asemb.luwi.dev;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # SSL Security Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Simple test page
        location / {
            default_type text/html;
            return 200 '<html><body><h1>HTTPS Test Page</h1><p>SSL is working correctly!</p><p>This is a test page for asemb.luwi.dev</p></body></html>';
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name asemb.luwi.dev www.asemb.luwi.dev;
        return 301 https://asemb.luwi.dev$request_uri;
    }
}