# SpecPulse Configuration for LSEMB
# Luwi Semantic Bridge - Multi-Instance Development

version: 2.6.0

# Project Configuration
project:
  name: lsemb
  type: web
  created: '2025-11-09T14:27:57.876654'
  description: 'Local development codebase for EmlakAI, Vergilex, and Bookie'

  # Production instances
  instances:
    - name: emlakai
      port_backend: 8084
      port_frontend: 4001
      redis_db: 1
    - name: vergilex
      port_backend: 8087
      port_frontend: 4003
      redis_db: 2
    - name: bookie
      port_backend: 8085
      port_frontend: 4002
      redis_db: 3

# AI Assistant Configuration
ai:
  # Primary implementation AI
  primary: claude-sonnet
  model: sonnet-4.5

  # AI Team Roles
  team:
    lead_developer: claude-sonnet      # Main implementation, coding, testing
    architect: claude-opus             # Architecture consultant, design decisions
    devops: gemini                     # Testing, DevOps, localization
    assistant: zai                     # Quick tasks, Claude's helper (haiku-like)

  # Settings
  fallback: true
  logging: true
  context_tracking: true

# Naming Conventions
conventions:
  # Git branch naming: 025-dashboard-performance-opt
  branch_naming: '{number:03d}-{feature-name}'

  # File naming conventions
  spec_naming: spec-{number:03d}.md
  plan_naming: plan-{number:03d}.md
  task_naming: task-{number:03d}.md

  # Feature directory naming
  feature_dir: '{number:03d}-{feature-name}'

  # Commit message format
  commit_prefix: 'feat|fix|refactor|docs|test|chore'

# Templates
templates:
  spec: .specpulse/templates/spec.md
  plan: .specpulse/templates/plan.md
  task: .specpulse/templates/task.md

# Workflow Configuration
workflow:
  # Auto-create git branch on feature init
  auto_branch: true

  # Auto-update context on major actions
  auto_context_update: true

  # Require tests before completion
  require_tests: true

  # Documentation requirements
  require_docs: true

  # Multi-instance deployment verification
  verify_all_instances: true

  # 🚨 CRITICAL: Deployment approval required
  require_deployment_approval: true
  deployment_approver: "User"  # All AIs MUST get user approval before deploying

# Development Settings
development:
  # Local database
  local_db: lsemb

  # Test before deploy
  test_local_first: true

  # Deployment order (sequence matters)
  deploy_order:
    - emlakai
    - vergilex
    - bookie

  # Rollback strategy
  rollback_enabled: true

# Quality Gates
quality:
  # Minimum test coverage
  min_test_coverage: 70

  # Code review checklist required
  code_review: true

  # Security scan
  security_scan: false  # Enable when tools configured

  # Performance benchmarks
  performance_check: false  # Enable for critical features

# Documentation Settings
documentation:
  # Main docs location
  docs_dir: docs/reports

  # Feature doc naming
  feature_doc_format: 'FEATURE_{feature_id}_{feature_name}.md'

  # Auto-generate docs
  auto_generate: true

  # Include in docs
  include_architecture: true
  include_api_docs: true
  include_deployment: true

# Integration Settings
integration:
  # Git integration
  git:
    enabled: true
    auto_commit: false  # Manual commits preferred
    auto_push: false

  # Database migrations
  database:
    migration_tool: knex
    auto_migrate_local: true
    verify_before_deploy: true

  # PM2 process management
  pm2:
    enabled: true
    restart_on_deploy: true
    log_monitoring: true

# Feature Complexity Estimation
estimation:
  # Time estimates for specification types
  core:
    min_hours: 2
    max_hours: 4
    complexity: low

  standard:
    min_hours: 8
    max_hours: 12
    complexity: medium

  complete:
    min_hours: 16
    max_hours: 24
    complexity: high

  # Buffer for testing and deployment
  testing_buffer: 0.2  # 20% of development time
  deployment_buffer: 0.1  # 10% for deployment

# Custom Commands (for future use)
custom_commands:
  # Quick deployment to all instances
  deploy_all: |
    ssh root@91.99.229.96 "
    for instance in emlakai vergilex bookie; do
      cd /var/www/$instance
      git pull
      cd backend && npm install && pm2 restart $instance-backend
      cd ../frontend && npm run build && pm2 restart $instance-frontend
    done"

  # Check all instance status
  status_all: |
    ssh root@91.99.229.96 "pm2 list | grep -E '(emlakai|vergilex|bookie)'"

  # View logs from all instances
  logs_all: |
    ssh root@91.99.229.96 "pm2 logs --lines 20"

# Notifications (for future use)
notifications:
  enabled: false
  channels: []  # email, slack, discord, etc.

# Metrics Tracking
metrics:
  track_completion_time: true
  track_estimate_accuracy: true
  track_deployment_success: true
  track_rollback_frequency: true

# Validation Rules
validation:
  # Spec validation
  spec:
    required_sections:
      - Overview
      - Requirements
      - Architecture Impact
      - Multi-Instance Deployment
      - Testing Strategy

  # Plan validation
  plan:
    required_sections:
      - Implementation Overview
      - Prerequisites
      - Implementation Phases
      - Multi-Instance Deployment Plan

  # Task validation
  task:
    require_estimates: true
    require_definition_of_done: true
    require_verification_steps: true
