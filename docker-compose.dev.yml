version: '3.8'

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: asemb-postgres-dev
    environment:
      POSTGRES_USER: asemb_user
      POSTGRES_PASSWORD: Semsiye!22
      POSTGRES_DB: asemb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asemb_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asemb-network

  # Redis for caching and queuing
  redis:
    image: redis:7-alpine
    container_name: asemb-redis-dev
    command: redis-server --requirepass Semsiye!22
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Semsiye!22", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asemb-network

  # API Server
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: asemb-api-dev
    environment:
      NODE_ENV: development
      PORT: 3000
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_PASSWORD: Semsiye!22
      POSTGRES_USER: asemb_user
      POSTGRES_PASSWORD: Semsiye!22
      POSTGRES_DB: asemb
      # API Keys and settings
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
      # Development settings
      API_RATE_LIMIT: "1000"
      API_RATE_WINDOW: "1m"
      CORS_ORIGIN: "http://localhost:3000"
    ports:
      - "8083:3000"
    volumes:
      - ./api:/app
      - ./workspaces:/workspaces
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev
    networks:
      - asemb-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: asemb-frontend-dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8083
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    command: npm run dev
    networks:
      - asemb-network

  # Nginx Reverse Proxy (optional - for production-like testing)
  nginx:
    image: nginx:alpine
    container_name: asemb-nginx-dev
    profiles:
      - with-nginx
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - asemb-network

  # n8n (for development/testing)
  n8n:
    image: n8nio/n8n:latest
    container_name: asemb-n8n-dev
    profiles:
      - with-n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=Semsiye!22
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=development
      - WEBHOOK_URL=http://localhost:5678/
      - DB_TYPE=sqlite
      - DB_FILEPATH=/home/node/.n8n/database.sqlite
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./dist:/home/node/.n8n/custom
    networks:
      - asemb-network

  # Adminer for database management
  adminer:
    image: adminer:latest
    container_name: asemb-adminer-dev
    profiles:
      - dev-tools
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - asemb-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local

networks:
  asemb-network:
    driver: bridge
    name: asemb-dev-network