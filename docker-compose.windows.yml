# Windows Docker Compose Configuration - Luwi Semantic Bridge
# Optimized for Windows with host networking support
version: '3.9'

services:
  # Redis - Local container
  redis:
    image: redis:7-alpine
    container_name: asemb-redis
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - asemb-network
    restart: unless-stopped

  # Backend API Server - Node.js
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.windows
    container_name: asemb-api
    environment:
      NODE_ENV: development
      DOCKER: true
      PORT: 8083
      # External Database Connection (host.docker.internal for Windows)
      POSTGRES_HOST: 91.99.229.96
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Semsiye!22
      POSTGRES_DB: asemb
      POSTGRES_SSL: "false"
      # Redis Connection
      REDIS_HOST: asemb-redis
      REDIS_PORT: 6379
      REDIS_DB: 2
      REDIS_PASSWORD: ""
      # API Configuration
      API_PREFIX: /api/v1
      ENABLE_CORS: "true"
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002
      # LLM Configuration
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      # Performance
      ENABLE_CACHING: "true"
      CACHE_TTL_SECONDS: 3600
      MAX_WORKERS: 4
      # WebSocket
      ENABLE_WEBSOCKETS: "true"
      WEBSOCKET_PORT: 8084
    ports:
      - "8083:8083"
      - "8084:8084"  # WebSocket port
    volumes:
      - type: bind
        source: ./backend
        target: /app
        consistency: cached
      - /app/node_modules
      - type: bind
        source: ./config
        target: /config
        consistency: cached
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - asemb-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: npm run dev

  # Frontend - Next.js Chatbot Interface
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.windows
      target: development
    container_name: asemb-frontend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8083
      ASB_API_URL: http://localhost:8083
      NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_WEBSOCKET_URL: ws://localhost:8084
      NEXT_PUBLIC_API_HOST: localhost
      NEXT_PUBLIC_API_PORT: 8083
      NEXT_PUBLIC_PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - type: bind
        source: ./frontend
        target: /app
        consistency: cached
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - asemb-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Dashboard - Next.js Admin Interface
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.windows
      target: development
    container_name: asemb-dashboard
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8083
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3001:3000"
    volumes:
      - type: bind
        source: ./dashboard
        target: /app
        consistency: cached
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - asemb-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # RAG-anything Service
  rag-anything-service:
    build:
      context: ./RAG-anything
      dockerfile: Dockerfile
    container_name: asemb-rag-anything
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
    ports:
      - "8002:8002"
    volumes:
      - type: bind
        source: ./RAG-anything
        target: /app
        consistency: cached
    networks:
      - asemb-network
    restart: unless-stopped

  # Development Tools
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: asemb-redis-insight
    profiles:
      - dev-tools
    ports:
      - "8002:8001"
    volumes:
      - redis_insight:/db
    networks:
      - asemb-network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  redis_insight:
    driver: local

networks:
  asemb-network:
    driver: bridge
    name: asemb-network
    ipam:
      config:
        - subnet: 172.20.0.0/16