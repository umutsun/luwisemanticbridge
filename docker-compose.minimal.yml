version: '3.8'

services:
  # Redis
  redis:
    image: redis:7-alpine
    container_name: asemb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - asemb-network

  # Frontend Application
  frontend:
    image: node:18-alpine
    container_name: asemb-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      - "3000:3000"
    networks:
      - asemb-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: asemb-nginx
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - asemb-network

volumes:
  redis_data:

networks:
  asemb-network:
    driver: bridge