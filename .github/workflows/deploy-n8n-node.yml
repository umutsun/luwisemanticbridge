name: Deploy n8n Community Node

on:
  push:
    branches: [ main, master ]
    paths:
      - 'packages/n8n-node/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/n8n-node

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: packages/n8n-node/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Build Node
      run: npm run build

    - name: Pack Node
      run: npm pack

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: n8n-node-package
        path: packages/n8n-node/*.tgz
        retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: n8n-node-package
        path: ./dist

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh/
        echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        cat >>~/.ssh/config <<END
        Host n8n-server
          HostName ${{ secrets.DEPLOY_HOST }}
          Port ${{ secrets.DEPLOY_PORT }}
          User ${{ secrets.DEPLOY_USER }}
          IdentityFile ~/.ssh/id_ed25519
          StrictHostKeyChecking no
        END

    - name: Copy Package to Server
      run: |
        scp ./dist/*.tgz n8n-server:/tmp/n8n-node.tgz

    - name: Install and Restart
      run: |
        ssh n8n-server << 'EOF'
          # Define installation directory
          N8N_CUSTOM_DIR="/root/.n8n/custom"
          mkdir -p $N8N_CUSTOM_DIR
          
          # Navigate into custom directory
          cd $N8N_CUSTOM_DIR
          
          # Remove previous installation if exists (by removing node_modules/n8n-nodes-luwi-semantic-bridge)
          rm -rf node_modules/n8n-nodes-luwi-semantic-bridge
          
          # Install the new package
          npm install /tmp/n8n-node.tgz --omit=dev --no-audit
          
          # Restart n8n
          if command -v pm2 &> /dev/null; then
            pm2 restart n8n || pm2 restart all
          else
            echo "PM2 not found, skipping restart"
          fi
        EOF
