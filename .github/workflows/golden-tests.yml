name: Golden Tests - Semantic Analyzer

on:
  push:
    branches: [main]
    paths:
      - 'backend/python-services/services/semantic_analyzer_service.py'
      - 'backend/python-services/tests/golden/**'
      - 'backend/python-services/tests/test_golden.py'
  pull_request:
    branches: [main]
    paths:
      - 'backend/python-services/services/semantic_analyzer_service.py'
      - 'backend/python-services/tests/golden/**'
      - 'backend/python-services/tests/test_golden.py'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  golden-tests:
    name: Run Golden Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/python-services/requirements.txt

      - name: Install dependencies
        working-directory: backend/python-services
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run Golden Tests
        working-directory: backend/python-services
        id: golden_tests
        run: |
          echo "## Golden Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Run tests and capture output
          set +e
          pytest tests/test_golden.py -v --tb=short 2>&1 | tee test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # Parse results for summary
          PASSED=$(grep -c "PASSED" test_output.txt || echo "0")
          FAILED=$(grep -c "FAILED" test_output.txt || echo "0")

          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # If tests failed, add failure details
          if [ $TEST_EXIT_CODE -ne 0 ]; then
            echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            grep -A 20 "GOLDEN TEST FAILURE" test_output.txt >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

          exit $TEST_EXIT_CODE

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-test-results
          path: backend/python-services/test_output.txt
          retention-days: 7

  config-version-check:
    name: Config Version Tracking
    runs-on: ubuntu-latest
    needs: golden-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check for config changes
        working-directory: backend/python-services
        run: |
          echo "## Config Version Check" >> $GITHUB_STEP_SUMMARY

          # Check if semantic_analyzer_service.py changed
          if git diff --name-only HEAD~1 HEAD | grep -q "semantic_analyzer_service.py"; then
            echo "Config file was modified in this commit." >> $GITHUB_STEP_SUMMARY

            # Show pattern count changes
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Pattern Counts" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            python3 scripts/print_config_version.py >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "No config changes detected." >> $GITHUB_STEP_SUMMARY
          fi

  regression-alert:
    name: Regression Alert
    runs-on: ubuntu-latest
    needs: golden-tests
    if: failure()

    steps:
      - name: Create regression alert
        run: |
          echo "## REGRESSION DETECTED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Golden tests failed. Please review the test output above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action Required:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Check which tests failed" >> $GITHUB_STEP_SUMMARY
          echo "2. Review the changes in semantic_analyzer_service.py" >> $GITHUB_STEP_SUMMARY
          echo "3. Either fix the regression or update the golden tests if intentional" >> $GITHUB_STEP_SUMMARY
