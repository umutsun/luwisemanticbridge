version: '3.8'

services:
  # Ana uygulama container'ı
  alice-bridge:
    build:
      context: .
      dockerfile: Dockerfile.asemb
    container_name: asemb-app
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
      - "${BACKEND_PORT:-8083}:8083"
    environment:
      # Node
      - NODE_ENV=${NODE_ENV:-production}
      
      # Database
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-asemb}
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      
      # API Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      
      # Settings
      - SETTINGS_API_URL=http://localhost:8083
      - EMBEDDINGS_MANAGER_URL=http://localhost:8083
      
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Agent dosyaları
      - ./.claude:/app/.claude:rw
      - ./.gemini:/app/.gemini:rw
      - ./.codex:/app/.codex:rw
      
      # Development modunda hot reload için
      - ./backend:/app/backend:delegated
      - ./frontend:/app/frontend:delegated
      
      # Node modules'i container içinde tut
      - /app/backend/node_modules
      - /app/frontend/node_modules
      
    restart: unless-stopped
    networks:
      - asemb-network

  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: asemb-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-asemb}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-asemb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - asemb-network

  # Redis for shared memory & caching
  redis:
    image: redis:7-alpine
    container_name: asemb-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - asemb-network

  # Nginx reverse proxy (production için)
  nginx:
    image: nginx:alpine
    container_name: asemb-nginx
    profiles: ["production"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - alice-bridge
    restart: unless-stopped
    networks:
      - asemb-network

networks:
  asemb-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
