<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for cube faces -->
    <linearGradient id="cubeTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#3730a3"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Connection dots gradient -->
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </radialGradient>
  </defs>

  <!-- Main Cube -->
  <g filter="url(#glow)">
    <!-- Top face -->
    <polygon points="32,8 52,20 32,32 12,20" fill="url(#cubeTop)"/>
    <!-- Left face -->
    <polygon points="12,20 32,32 32,52 12,40" fill="url(#cubeLeft)"/>
    <!-- Right face -->
    <polygon points="52,20 52,40 32,52 32,32" fill="url(#cubeRight)"/>
  </g>

  <!-- Semantic connection lines (bridge concept) -->
  <g stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round" opacity="0.8">
    <!-- Lines radiating from cube corners -->
    <line x1="12" y1="20" x2="4" y2="16"/>
    <line x1="52" y1="20" x2="60" y2="16"/>
    <line x1="32" y1="52" x2="32" y2="60"/>
    <line x1="12" y1="40" x2="4" y2="44"/>
    <line x1="52" y1="40" x2="60" y2="44"/>
  </g>

  <!-- Connection nodes (semantic endpoints) -->
  <circle cx="4" cy="16" r="3" fill="url(#dotGlow)"/>
  <circle cx="60" cy="16" r="3" fill="url(#dotGlow)"/>
  <circle cx="32" cy="60" r="3" fill="url(#dotGlow)"/>
  <circle cx="4" cy="44" r="2.5" fill="url(#dotGlow)" opacity="0.8"/>
  <circle cx="60" cy="44" r="2.5" fill="url(#dotGlow)" opacity="0.8"/>

  <!-- Inner cube highlight (depth effect) -->
  <polygon points="32,14 44,22 32,30 20,22" fill="white" opacity="0.15"/>
</svg>
