# Vergilex Nginx Configuration
# SSE (Server-Sent Events) support for migration endpoints
# Updated: 2024

server {
    listen 80;
    server_name vergilex.luwi.dev;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vergilex.luwi.dev;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/vergilex.luwi.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vergilex.luwi.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Logging
    access_log /var/log/nginx/vergilex.access.log;
    error_log /var/log/nginx/vergilex.error.log;

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:4003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ============================================
    # SSE Endpoints - MUST come before general /api/
    # These require special buffering settings
    # ============================================

    # Migration Progress Stream (SSE)
    location /api/v2/migration/progress-stream {
        proxy_pass http://127.0.0.1:8087;
        proxy_http_version 1.1;

        # SSE Critical Settings
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # Headers for SSE
        proxy_set_header Connection '';
        proxy_set_header Cache-Control 'no-cache';
        proxy_set_header X-Accel-Buffering 'no';

        # Long timeout for SSE (24 hours)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        keepalive_timeout 86400s;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Migration Generate (Streaming Response)
    location /api/v2/migration/generate {
        proxy_pass http://127.0.0.1:8087;
        proxy_http_version 1.1;

        # Streaming Critical Settings
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # Headers for streaming
        proxy_set_header Connection '';
        proxy_set_header X-Accel-Buffering 'no';

        # Long timeout for migration (1 hour)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chat Stream (SSE) - if using streaming chat
    location /api/v2/chat/stream {
        proxy_pass http://127.0.0.1:8087;
        proxy_http_version 1.1;

        # SSE Critical Settings
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # Headers for SSE
        proxy_set_header Connection '';
        proxy_set_header Cache-Control 'no-cache';
        proxy_set_header X-Accel-Buffering 'no';

        # Long timeout for chat streaming
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # General API Endpoints
    # ============================================

    location /api/ {
        proxy_pass http://127.0.0.1:8087;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Standard API timeout
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Request size for file uploads
        client_max_body_size 100M;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8087;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    # WebSocket support (if needed)
    location /ws {
        proxy_pass http://127.0.0.1:8087;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Static files caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
