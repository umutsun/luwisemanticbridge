upstream scriptus_frontend {
    server 127.0.0.1:3001;
}

upstream scriptus_backend {
    server 127.0.0.1:8086;
}

server {
    listen 80;
    server_name scriptus.luwi.dev;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name scriptus.luwi.dev;

    ssl_certificate /etc/letsencrypt/live/scriptus.luwi.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scriptus.luwi.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://scriptus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://scriptus_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}
