upstream bookie_frontend {
    server 127.0.0.1:4002;
}

upstream bookie_backend {
    server 127.0.0.1:8085;
}

server {
    listen 80;
    server_name bookie.luwi.dev;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name bookie.luwi.dev;

    ssl_certificate /etc/letsencrypt/live/bookie.luwi.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookie.luwi.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    # WebSocket - all paths starting with /ws (MUST be before /api)
    location ~ ^/ws(/.*)?$ {
        proxy_pass http://bookie_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }

    # API routes
    location /api/ {
        proxy_pass http://bookie_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_read_timeout 300s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }

    # WebSocket support for Socket.IO
    location /socket.io/ {
        proxy_pass http://bookie_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # All other routes - proxy to frontend
    location / {
        proxy_pass http://bookie_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_read_timeout 86400;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }
}
