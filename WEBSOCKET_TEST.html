<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Connection Test</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        #logs { background: #f8f9fa; padding: 15px; height: 300px; overflow-y: auto; font-family: monospace; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>WebSocket Connection Test</h1>

    <div id="status" class="status info">Connecting to WebSocket...</div>

    <button onclick="testConnection()" id="connectBtn">Connect</button>
    <button onclick="sendTestMessage()" id="sendBtn" disabled>Send Test Message</button>
    <button onclick="clearLogs()">Clear Logs</button>

    <h3>Connection Logs:</h3>
    <div id="logs"></div>

    <script>
        const backendUrl = 'http://localhost:8083';
        let socket = null;
        let isConnected = false;

        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.innerHTML = `<span style="color: #666">[${time}]</span> ${message}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
            console.log(message);
        }

        function updateStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
        }

        function testConnection() {
            if (socket && socket.connected) {
                socket.disconnect();
            }

            log(`🔌 Attempting to connect to: ${backendUrl}`);
            updateStatus('Connecting...', 'info');

            socket = io(backendUrl, {
                transports: ['websocket', 'polling'],
                reconnection: false
            });

            socket.on('connect', () => {
                isConnected = true;
                log(`✅ Connected successfully! Socket ID: ${socket.id}`, 'success');
                updateStatus('Connected', 'success');
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('connectBtn').textContent = 'Disconnect';
            });

            socket.on('disconnect', (reason) => {
                isConnected = false;
                log(`❌ Disconnected: ${reason}`, 'error');
                updateStatus('Disconnected', 'error');
                document.getElementById('sendBtn').disabled = true;
                document.getElementById('connectBtn').textContent = 'Connect';
            });

            socket.on('connect_error', (error) => {
                log(`❌ Connection error: ${error.message}`, 'error');
                updateStatus('Connection Failed', 'error');
            });

            socket.on('notification', (data) => {
                log(`📥 Received notification: ${JSON.stringify(data)}`, 'info');
            });
        }

        function sendTestMessage() {
            if (socket && isConnected) {
                log('📤 Sending test message...', 'info');
                socket.emit('notification:test', {
                    message: 'Test from browser',
                    timestamp: new Date().toISOString()
                });
            } else {
                log('❌ Cannot send message - not connected', 'error');
            }
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }

        // Auto-connect on page load
        setTimeout(testConnection, 100);
    </script>
</body>
</html>
