<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>Settings API Test</h1>
    <button onclick="testSettingsAPI()">Test Settings API</button>
    <div id="result"></div>

    <script>
        async function testSettingsAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';

            try {
                // Test direct backend call
                console.log('Testing direct backend API...');
                const directResponse = await fetch('http://localhost:8084/api/v2/settings/', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (directResponse.ok) {
                    const data = await directResponse.json();
                    console.log('Direct API success:', data);
                    resultDiv.innerHTML += '<br><br>✅ Direct API call successful!<br>';
                    resultDiv.innerHTML += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } else {
                    console.error('Direct API failed:', directResponse.status);
                    resultDiv.innerHTML += '<br><br>❌ Direct API call failed: ' + directResponse.status;
                }

                // Test through Next.js proxy (if working)
                console.log('Testing Next.js proxy API...');
                const proxyResponse = await fetch('/api/v2/settings/', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (proxyResponse.ok) {
                    const data = await proxyResponse.json();
                    console.log('Proxy API success:', data);
                    resultDiv.innerHTML += '<br><br>✅ Proxy API call successful!<br>';
                } else {
                    console.error('Proxy API failed:', proxyResponse.status);
                    resultDiv.innerHTML += '<br><br>❌ Proxy API call failed: ' + proxyResponse.status;
                }

            } catch (error) {
                console.error('Test failed:', error);
                resultDiv.innerHTML += '<br><br>❌ Test failed: ' + error.message;
            }
        }

        // Auto-run test
        testSettingsAPI();
    </script>
</body>
</html>
