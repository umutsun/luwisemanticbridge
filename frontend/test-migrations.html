<!DOCTYPE html>
<html>
<head>
    <title>Test Migrations API</title>
</head>
<body>
    <h1>Testing Migrations API</h1>
    <button onclick="testAPI()">Test API</button>
    <button onclick="testWithAuth()">Test With Auth</button>
    <div id="output"></div>

    <script>
        async function testAPI() {
            const output = document.getElementById('output');
            output.innerHTML = 'Testing API...';

            try {
                const response = await fetch('http://localhost:8083/api/v2/embeddings-tables/all');
                const data = await response.json();
                output.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                output.innerHTML = 'Error: ' + error.message;
            }
        }

        async function testWithAuth() {
            const output = document.getElementById('output');
            output.innerHTML = 'Testing with auth...';

            // First login to get token
            try {
                const loginResponse = await fetch('http://localhost:8083/api/v2/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'admin@example.com',
                        password: 'admin123'
                    })
                });

                const loginData = await loginResponse.json();
                const token = loginData.token;

                if (token) {
                    const response = await fetch('http://localhost:8083/api/v2/embeddings-tables/all', {
                        headers: {
                            'Authorization': 'Bearer ' + token
                        }
                    });
                    const data = await response.json();
                    output.innerHTML = '<h3>Success with auth:</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } else {
                    output.innerHTML = 'Failed to get token';
                }
            } catch (error) {
                output.innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
