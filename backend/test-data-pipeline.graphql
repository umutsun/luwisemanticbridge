# Test GraphQL queries and mutations for data pipeline

# Step 1: Analyze scraped data
query TestAnalyzeData {
  analyzeScrapedData(
    source: "C:\\xampp\\htdocs\\lsemb\\backend\\test-scraped-data.json"
    projectKey: "test-project"
    options: {
      sampleSize: 100
      detectRelationships: true
      runQualityChecks: true
      suggestIndexes: true
    }
  ) {
    id
    projectKey
    source
    rowCount
    columnCount
    dataQualityScore
    detectedEntities {
      name
      confidence
      fields
      suggestedPrimaryKey
    }
    fieldTypes {
      fieldName
      detectedType
      suggestedSQLType
      nullable
      isPrimaryKey
      isUnique
      hasIndex
      uniqueValues
      nullCount
      sampleValues
      warnings
    }
    issues {
      severity
      field
      description
      suggestion
      affectedRows
      canAutoFix
    }
    analyzedAt
    analyzedBy
  }
}

# Step 2: Get table schema suggestion
# Replace {ANALYSIS_ID} with the ID from step 1
query TestSuggestSchema {
  suggestTableSchema(
    dataAnalysisId: "{ANALYSIS_ID}"
    customizations: {
      tableName: "products_test"
    }
  ) {
    id
    dataAnalysisId
    tableName
    primaryKey
    columns {
      name
      type
      nullable
      defaultValue
      isPrimaryKey
      isUnique
      comment
    }
    indexes {
      name
      columns
      type
      unique
    }
    constraints {
      name
      type
      columns
      definition
    }
    createTableSQL
    estimatedSize
    conflicts {
      type
      description
      affectedObject
      resolution
      severity
    }
    warnings
    recommendations
    isValid
    validationErrors
  }
}

# Step 3: Create table from data (two-step process)
# Replace {SCHEMA_ID} with the ID from step 2
mutation TestCreateTableFromData {
  createTableFromData(
    schemaId: "{SCHEMA_ID}"
    importData: true
  ) {
    success
    tableName
    rowsInserted
    errors
    warnings
    executionTime
    tableSchema {
      tableName
      columns {
        name
        type
      }
    }
  }
}

# Step 4: Complete pipeline (one-step process)
mutation TestCompletePipeline {
  createAndPopulateTable(
    source: "C:\\xampp\\htdocs\\lsemb\\backend\\test-scraped-data.json"
    projectKey: "test-project"
    tableName: "products_complete_test"
    embedAfterInsert: false
  ) {
    success
    tableName
    rowsInserted
    errors
    warnings
    executionTime
    tableSchema {
      tableName
      createTableSQL
    }
  }
}

# Step 5: List existing tables
query TestExistingTables {
  existingTables(schema: "public", includeSystemTables: false) {
    schema
    name
    rowCount
    columns {
      name
      type
      nullable
      isPrimaryKey
    }
    indexes {
      name
      columns
      unique
    }
  }
}

# Step 6: Get specific table details
query TestTableDetails {
  tableDetails(tableName: "products_test", schema: "public") {
    schema
    name
    rowCount
    columns {
      name
      type
      nullable
      defaultValue
      isPrimaryKey
      isUnique
    }
    indexes {
      name
      columns
      type
      unique
    }
  }
}
