version: '3.8'

services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: asemb-postgres
    environment:
      POSTGRES_USER: asemb_user
      POSTGRES_PASSWORD: asemb_password_2025
      POSTGRES_DB: asemb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - asemb-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: asemb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - asemb-network

  # API Service
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: asemb-api
    environment:
      - NODE_ENV=development
      - PORT=8083
      - DATABASE_URL=postgresql://asemb_user:asemb_password_2025@postgres:5432/asemb
      - REDIS_HOST=redis
    ports:
      - "8083:8083"
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - asemb-network
    # Override CMD to run as root user for development
    command: nodemon server.js

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: asemb-frontend
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8083
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - asemb-network
    command: npm run dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  asemb-network:
    driver: bridge