<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASB Core Boot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap');

        body {
            background-color: #00001a;
            color: #89cff0;
            font-family: 'Roboto Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-size: 16px;
        }

        #terminal {
            width: 98%;
            max-width: 1200px;
            height: 95%;
            border: 1px solid #2a3a7d;
            box-shadow: 0 0 10px #2a3a7d, 0 0 20px #2a3a7d inset;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            background: #00001a;
            position: relative;
        }
        
        #terminal::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg, rgba(10, 20, 50, 0.1), rgba(10, 20, 50, 0.1) 1px, transparent 1px, transparent 3px);
            pointer-events: none;
            z-index: 2;
        }
        
        #header {
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 0 0 5px #89cff0;
            color: #d0f0ff;
            font-size: 1.2em;
        }

        #content {
            display: flex;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        #status-container {
            width: 45%;
            padding-right: 20px;
            border-right: 1px dashed #2a3a7d;
        }

        #cube-container {
            width: 55%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            line-height: 1.0;
            text-shadow: 0 0 2px #89cff0;
            white-space: pre;
        }

        .status-line {
            margin-bottom: 12px;
        }
        .status-line .label {
            color: #89cff0;
        }
        .status-line .value {
            color: #d0f0ff;
        }
        .status-line .dots {
            display: inline-block;
            width: 80px;
        }
        .done {
            color: #4a7a9d;
        }
        
        /* Gradient colors for the cube */
        .c0 { color: #001f3f; text-shadow: none; } /* Darkest Navy */
        .c1 { color: #002b55; }
        .c2 { color: #00376b; }
        .c3 { color: #004381; }
        .c4 { color: #004f97; }
        .c5 { color: #005bad; }
        .c6 { color: #207acc; }
        .c7 { color: #4098eb; }
        .c8 { color: #60b6ff; }
        .c9 { color: #89cff0; }
        .c10 { color: #a1d9f5; }
        .c11 { color: #d0f0ff; text-shadow: 0 0 5px #d0f0ff; } /* Brightest */

    </style>
</head>
<body>
    <div id="terminal">
        <div id="header">ALICE SEMANTIC BRIDGE :: CORE INITIALIZATION</div>
        <div id="content">
            <div id="status-container"></div>
            <div id="cube-container"></div>
        </div>
    </div>

    <script>
    const cubeContainer = document.getElementById('cube-container');
    const statusContainer = document.getElementById('status-container');

    // --- ASCII Cube 3D Rotation V2 ---
    const screenWidth = 80, screenHeight = 40;
    let angleX = 0, angleY = 0, angleZ = 0;
    let rotSpeedX = 0.005 + (Math.random() - 0.5) * 0.002;
    let rotSpeedY = 0.008 + (Math.random() - 0.5) * 0.002;
    let rotSpeedZ = 0.003 + (Math.random() - 0.5) * 0.002;

    const K1 = 40;
    const K2 = 5;
    const lightSource = [0, -1, -1]; // Light from top-front
    const normalizedLight = Math.sqrt(lightSource[0]**2 + lightSource[1]**2 + lightSource[2]**2);
    const light = [lightSource[0]/normalizedLight, lightSource[1]/normalizedLight, lightSource[2]/normalizedLight];

    const luminanceChars = '.,-~:;=!*#$@';
    const colorPalette = Array.from({length: 12}, (_, i) => `c${i}`);

    function renderFrame() {
        const output = Array(screenWidth * screenHeight).fill(' ');
        const zBuffer = Array(screenWidth * screenHeight).fill(-Infinity);

        const cosX = Math.cos(angleX), sinX = Math.sin(angleX);
        const cosY = Math.cos(angleY), sinY = Math.sin(angleY);
        const cosZ = Math.cos(angleZ), sinZ = Math.sin(angleZ);

        // Iterate through the cube's volume
        for (let x = -1; x <= 1; x += 0.07) {
            for (let y = -1; y <= 1; y += 0.07) {
                for (let z = -1; z <= 1; z += 0.03) {
                    
                    // Rotate point
                    const y1 = y * cosX - z * sinX;
                    const z1 = y * sinX + z * cosX;
                    const x1 = x * cosY + z1 * sinY;
                    const z2 = -x * sinY + z1 * cosY;
                    const x2 = x1 * cosZ - y1 * sinZ;
                    const y2 = x1 * sinZ + y1 * cosZ;
                    const z3 = z2 + K2;

                    const ooz = 1 / z3; // One over Z

                    // Project to 2D
                    const xp = Math.floor(screenWidth / 2 + K1 * ooz * x2);
                    const yp = Math.floor(screenHeight / 2 - K1 * ooz * y2);

                    const bufferIdx = xp + yp * screenWidth;

                    if (bufferIdx >= 0 && bufferIdx < screenWidth * screenHeight && ooz > zBuffer[bufferIdx]) {
                        zBuffer[bufferIdx] = ooz;

                        // Calculate surface normal (approximated by point's position on a unit cube)
                        // This is a simplification for a cube; for complex shapes, this is harder.
                        let normalX = 0, normalY = 0, normalZ = 0;
                        if (Math.abs(x) > 0.99) normalX = x > 0 ? 1 : -1;
                        else if (Math.abs(y) > 0.99) normalY = y > 0 ? 1 : -1;
                        else if (Math.abs(z) > 0.99) normalZ = z > 0 ? 1 : -1;
                        
                        // Rotate normal
                        const ny1 = normalY * cosX - normalZ * sinX;
                        const nz1 = normalY * sinX + normalZ * cosX;
                        const nx1 = normalX * cosY + nz1 * sinY;
                        const nz2 = -normalX * sinY + nz1 * cosY;
                        const nx2 = nx1 * cosZ - ny1 * sinZ;
                        const ny2 = nx1 * sinZ + ny1 * cosZ;

                        // Calculate luminance
                        const L = nx2 * light[0] + ny2 * light[1] + nz2 * light[2];
                        
                        if (L > 0) {
                            const luminanceIndex = Math.floor(L * (luminanceChars.length - 1));
                            const char = luminanceChars[luminanceIndex];
                            
                            const colorIndex = Math.min(colorPalette.length - 1, Math.floor(L * colorPalette.length));
                            const colorClass = colorPalette[colorIndex];

                            output[bufferIdx] = `<span class="${colorClass}">${char}</span>`;
                        }
                    }
                }
            }
        }

        let html = '';
        for (let i = 0; i < screenWidth * screenHeight; i++) {
            html += (i % screenWidth === screenWidth - 1) ? (output[i] + '\n') : output[i];
        }
        cubeContainer.innerHTML = html;

        angleX += rotSpeedX;
        angleY += rotSpeedY;
        angleZ += rotSpeedZ;

        requestAnimationFrame(renderFrame);
    }


    // --- Status Text Animation (re-usable) ---
    const statusMessages = [
        { label: "Bootstrapping Kernel", time: 500 },
        { label: "Initializing Semantic Bridge", time: 700 },
        { label: "Loading Embedding Models", time: 1000 },
        { label: "Calibrating Context Engine", time: 800 },
        { label: "Deploying Data Mining Agents", time: 1200 },
        { label: "Verifying Knowledge Graph", time: 900 },
        { label: "Syncing Multi-Agent Structure", time: 1100 },
        { label: "Translation Layers", time: 600 },
        { label: "System Ready", time: 300, final: true }
    ];

    async function animateStatus() {
        for (const message of statusMessages) {
            const line = document.createElement('div');
            line.classList.add('status-line');
            
            const labelSpan = document.createElement('span');
            labelSpan.classList.add('label');
            labelSpan.textContent = message.label;
            
            const dotsSpan = document.createElement('span');
            dotsSpan.classList.add('dots');

            line.appendChild(labelSpan);
            line.appendChild(dotsSpan);
            statusContainer.appendChild(line);

            let dotCount = 0;
            const dotInterval = setInterval(() => {
                dotsSpan.textContent = ".".repeat(dotCount % 10);
                dotCount++;
            }, 100);

            await new Promise(resolve => setTimeout(resolve, message.time));
            
            clearInterval(dotInterval);
            dotsSpan.textContent = ".".repeat(10);
            
            const doneSpan = document.createElement('span');
            doneSpan.classList.add('done');
            doneSpan.textContent = message.final ? "[OK]" : "[DONE]";
            line.appendChild(doneSpan);
        }
    }

    // --- Start Animations ---
    renderFrame();
    animateStatus();

    </script>
</body>
</html>
